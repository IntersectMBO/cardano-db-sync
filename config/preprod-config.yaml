# Explorer DB Node configuration

NetworkName: preprod

EnableLogMetrics: False
EnableLogging: True

# The default port is 8080
# PrometheusPort: 8080

# The config file for the node we are connecting to. If this is not the correct
# config, it will likely lead to db-sync throwing up weird error messages from
# the consensus layer.
# The path to the node config file is relative to this config file.
NodeConfigFile: /nix/store/3yi8nb7s8hw6x2gami2jdp7jhgbqnv0y-config-0-0.json

# ------------------------------------------------------------------------------
# Logging configuration follows (trace-dispatcher).
#
# db-sync uses the same tracing system as cardano-node. The old
# iohk-monitoring keys (minSeverity, setupScribes, defaultScribes,
# setupBackends, rotation, options, ...) are no longer read.
#
# Logs and metrics can be forwarded to a cardano-tracer process by starting
# db-sync with: --tracer-socket-path-connect /path/to/tracer.socket

# Per namespace configuration. The empty string is the root namespace and
# applies to every message unless a more specific namespace overrides it.
TraceOptions:
  "":
    severity: Info
    detail: DNormal
    backends:
      - Stdout HumanFormatUncoloured
      # Forward messages to cardano-tracer. This backend is added
      # automatically when db-sync is started with
      # --tracer-socket-path-connect:
      # - Forwarder
      # Expose metrics to an EKG store (pulled by cardano-tracer):
      # - EKGBackend

  # The network protocol tracers are noisy, so restrict them to errors.
  Mux:
    severity: Error
  Subscription:
    severity: Error

# Options for the connection to cardano-tracer.
# TraceOptionForwarder:
#   queueSize: 192
#   verbosity: Minimum
#   maxReconnectDelay: 45

# The name of this process used when forwarding to cardano-tracer.
# Defaults to the NetworkName from this file.
# TraceOptionNodeName: preprod-db-sync

# Emit resource usage (memory, GC, CPU) messages with this period in
# milliseconds. Disabled when not set.
# TraceOptionResourceFrequency: 5000
