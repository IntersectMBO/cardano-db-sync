# Telegraf Configuration for Cardano DB Sync Monitoring
# This configuration collects system, PostgreSQL, and process metrics
# and exposes them in Prometheus format at :9273/metrics

###############################################################################
#                            GLOBAL AGENT CONFIG                              #
###############################################################################

[agent]
  ## Default data collection interval
  interval = "10s"
  
  ## Rounds collection interval to 'interval'
  round_interval = true
  
  ## Telegraf will send metrics to outputs in batches
  metric_batch_size = 1000
  
  ## Maximum number of unwritten metrics per output
  metric_buffer_limit = 10000
  
  ## Flush interval for all outputs
  flush_interval = "10s"
  
  ## Override hostname (auto-detected if not specified)
  # hostname = "cardano-db-sync-dev"
  
  ## Log only error level messages
  quiet = false
  logfile = "/tmp/telegraf.log"

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

# Expose metrics in Prometheus format
[[outputs.prometheus_client]]
  ## Address to listen on
  listen = ":9273"
  
  ## Metric endpoint path
  path = "/metrics"
  
  ## Expiration interval for metrics that haven't been updated
  expiration_interval = "60s"
  
  ## Export metric collection timestamp
  export_timestamp = true
  
  ## Metric type override
  # This ensures histograms and summaries are properly exported
  collectors_exclude = ["gocollector", "process"]

###############################################################################
#                        SYSTEM METRICS (macOS)                               #
###############################################################################

# CPU usage metrics
[[inputs.cpu]]
  ## Whether to report per-cpu stats or not
  percpu = true
  
  ## Whether to report total system cpu stats or not
  totalcpu = true
  
  ## If true, collect raw CPU time metrics
  collect_cpu_time = false
  
  ## If true, compute and report the sum of all non-idle CPU states
  report_active = true
  
  [inputs.cpu.tags]
    source = "telegraf"
    component = "system"

# Memory usage metrics
[[inputs.mem]]
  [inputs.mem.tags]
    source = "telegraf"
    component = "system"

# Disk usage metrics
[[inputs.disk]]
  ## Ignore mount points by filesystem type
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]
  
  [inputs.disk.tags]
    source = "telegraf"
    component = "system"

# Disk I/O metrics
[[inputs.diskio]]
  ## Devices to collect stats for
  ## If empty, stats for all devices are collected
  # devices = ["disk0", "disk1"]
  
  [inputs.diskio.tags]
    source = "telegraf"
    component = "system"

# Network interface metrics
[[inputs.net]]
  ## By default, telegraf gathers stats from any up interface (excluding loopback)
  ## On macOS, en0 is typically WiFi, en1 might be Ethernet
  interfaces = ["en*"]
  
  [inputs.net.tags]
    source = "telegraf"
    component = "system"

# Network protocol statistics
[[inputs.netstat]]
  [inputs.netstat.tags]
    source = "telegraf"
    component = "system"

# System-wide statistics
[[inputs.system]]
  ## Collect additional metrics
  # Uncomment to collect more metrics (may require elevated permissions)
  # fielddrop = ["uptime_format"]
  
  [inputs.system.tags]
    source = "telegraf"
    component = "system"

# Process statistics (overall)
[[inputs.processes]]
  ## Collect per-process stats
  # use_sudo = false
  
  [inputs.processes.tags]
    source = "telegraf"
    component = "system"

###############################################################################
#                   CARDANO PROCESS METRICS                                   #
###############################################################################

# Monitor cardano-db-sync process specifically
# Using 'exe' matcher to avoid duplicate counting and matching unwanted processes
[[inputs.procstat]]
  ## Match by executable name (most precise)
  exe = "cardano-db-sync"
  
  ## Name for this process in metrics
  process_name = "cardano-db-sync"
  
  ## Fields to collect
  ## Available: cpu_time, cpu_time_guest, cpu_time_guest_nice, cpu_time_idle, 
  ##            cpu_time_iowait, cpu_time_irq, cpu_time_nice, cpu_time_softirq,
  ##            cpu_time_steal, cpu_time_system, cpu_time_user, cpu_usage,
  ##            memory_data, memory_locked, memory_rss, memory_stack, memory_swap,
  ##            memory_vms, num_fds, num_threads, pid
  fieldinclude = [
    "cpu_usage",
    "memory_rss",
    "memory_vms", 
    "num_threads",
    "num_fds"
  ]
  
  [inputs.procstat.tags]
    service = "cardano-db-sync"
    component = "application"
    source = "telegraf"

# Monitor cardano-node process (separate from db-sync)
[[inputs.procstat]]
  ## Match by executable name
  exe = "cardano-node"
  
  ## Name for this process in metrics
  process_name = "cardano-node"
  
  ## Fields to collect
  fieldinclude = [
    "cpu_usage",
    "memory_rss",
    "memory_vms", 
    "num_threads",
    "num_fds"
  ]
  
  [inputs.procstat.tags]
    service = "cardano-node"
    component = "node"
    source = "telegraf"

###############################################################################
#                      POSTGRESQL METRICS                                     #
###############################################################################

# PostgreSQL standard metrics
[[inputs.postgresql]]
  ## PostgreSQL connection string
  ## Connection without password (using local trust auth)
  address = "host=localhost user=telegraf_monitor dbname=postgres sslmode=disable"
  
  ## A list of databases to explicitly track. If not specified, metrics for all databases are gathered
  databases = ["cexplorer"]
  
  ## Whether to use prepared statements when connecting to the database
  ## This can help with performance on databases with many tables
  prepared_statements = true
  
  [inputs.postgresql.tags]
    service = "postgresql"
    database = "cexplorer"
    source = "telegraf"

# PostgreSQL extended metrics with custom queries
[[inputs.postgresql_extensible]]
  address = "host=localhost user=telegraf_monitor dbname=cexplorer sslmode=disable"
  
  ## Custom query: Block and transaction counts
  [[inputs.postgresql_extensible.query]]
    sqlquery = """SELECT COUNT(*) as block_count, COALESCE(MAX(block_no), 0) as max_block_no, COALESCE(MIN(block_no), 0) as min_block_no FROM block"""
    min_version = 901
    withdbname = false
    tagvalue = ""
    measurement = "cardano_db_blocks"
  
  ## Custom query: Transaction count
  [[inputs.postgresql_extensible.query]]
    sqlquery = """SELECT COUNT(*) as tx_count FROM tx"""
    min_version = 901
    withdbname = false
    tagvalue = ""
    measurement = "cardano_db_transactions"
  
  ## Custom query: Cache hit ratio
  [[inputs.postgresql_extensible.query]]
    sqlquery = """SELECT CASE WHEN (blks_hit + blks_read) = 0 THEN 100.0 ELSE ROUND(100.0 * blks_hit::numeric / (blks_hit + blks_read)::numeric, 2) END as cache_hit_ratio, blks_hit, blks_read FROM pg_stat_database WHERE datname = 'cexplorer'"""
    min_version = 901
    withdbname = false
    tagvalue = ""
    measurement = "cardano_db_cache"
  
  ## Custom query: Database size
  [[inputs.postgresql_extensible.query]]
    sqlquery = """SELECT pg_database_size('cexplorer') as db_size_bytes"""
    min_version = 901
    withdbname = false
    tagvalue = ""
    measurement = "cardano_db_size"
  
  ## Custom query: Top 5 largest tables
  [[inputs.postgresql_extensible.query]]
    sqlquery = """SELECT tablename as table_name, pg_total_relation_size('public.' || tablename) as table_size_bytes, n_live_tup as live_tuples, n_dead_tup as dead_tuples FROM pg_stat_user_tables WHERE schemaname = 'public' ORDER BY pg_total_relation_size('public.' || tablename) DESC LIMIT 5"""
    min_version = 901
    withdbname = false
    tagvalue = "table_name"
    measurement = "cardano_db_table_sizes"
  
  ## Custom query: Current epoch number from epoch_sync_time
  [[inputs.postgresql_extensible.query]]
    sqlquery = """SELECT COALESCE(MAX(no), 0) as epoch_no FROM epoch_sync_time"""
    min_version = 901
    withdbname = false
    tagvalue = ""
    measurement = "cardano_db_current_epoch"
  
  ## Custom query: pg_stat_statements - Top queries by total time
  ## Note: This requires pg_stat_statements extension to be loaded
  ## Run: CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
  [[inputs.postgresql_extensible.query]]
    sqlquery = """SELECT CASE WHEN query LIKE 'INSERT INTO tx_out%' THEN 'INSERT_tx_out' WHEN query LIKE 'INSERT INTO tx_in%' THEN 'INSERT_tx_in' WHEN query LIKE 'INSERT INTO tx %' OR query LIKE 'INSERT INTO tx(%' THEN 'INSERT_tx' WHEN query LIKE 'INSERT INTO block%' THEN 'INSERT_block' WHEN query LIKE 'INSERT INTO ma_tx_out%' THEN 'INSERT_ma_tx_out' WHEN query LIKE 'INSERT INTO ma_tx_mint%' THEN 'INSERT_ma_tx_mint' WHEN query LIKE 'INSERT INTO tx_metadata%' THEN 'INSERT_tx_metadata' WHEN query LIKE 'INSERT INTO stake_address%' THEN 'INSERT_stake_address' WHEN query LIKE 'INSERT INTO pool_hash%' THEN 'INSERT_pool_hash' WHEN query LIKE 'INSERT INTO datum%' THEN 'INSERT_datum' WHEN query LIKE 'INSERT INTO redeemer%' THEN 'INSERT_redeemer' WHEN query LIKE 'INSERT INTO epoch_stake%' THEN 'INSERT_epoch_stake' WHEN query LIKE 'INSERT INTO reward%' THEN 'INSERT_reward' WHEN query LIKE 'INSERT INTO slot_leader%' THEN 'INSERT_slot_leader' WHEN query LIKE 'INSERT INTO multi_asset%' THEN 'INSERT_multi_asset' WHEN query LIKE 'INSERT INTO extra_key_witness%' THEN 'INSERT_extra_key_without' WHEN query LIKE 'INSERT INTO collateral_tx_in%' THEN 'INSERT_collateral_tx_in' WHEN query LIKE 'INSERT INTO collateral_tx_out%' THEN 'INSERT_collateral_tx_out' WHEN query LIKE 'INSERT INTO withdrawal%' THEN 'INSERT_withdrawal' WHEN query LIKE 'INSERT INTO reference_tx_in%' THEN 'INSERT_reference_tx_in' WHEN query LIKE 'INSERT INTO delegation%' THEN 'INSERT_delegation' WHEN query LIKE 'INSERT INTO stake_registration%' THEN 'INSERT_stake_registration' WHEN query LIKE 'INSERT INTO stake_deregistration%' THEN 'INSERT_stake_deregistration' WHEN query LIKE 'INSERT INTO script%' THEN 'INSERT_script' WHEN query LIKE 'INSERT INTO pool_stat%' THEN 'INSERT_pool_stat' WHEN query LIKE 'INSERT INTO pool_metadata_ref%' THEN 'INSERT_pool_metadata_ref' WHEN query LIKE 'INSERT INTO pool_update%' THEN 'INSERT_pool_update' WHEN query LIKE 'INSERT INTO pool_relay%' THEN 'INSERT_pool_relay' WHEN query LIKE 'INSERT INTO pool_owner%' THEN 'INSERT_pool_owner' WHEN query LIKE 'INSERT INTO treasury%' THEN 'INSERT_treasury' WHEN query LIKE 'INSERT INTO reserve%' THEN 'INSERT_reserve' WHEN query LIKE 'INSERT INTO epoch %' THEN 'INSERT_epoch' WHEN query LIKE 'INSERT INTO epoch(%' THEN 'INSERT_epoch' WHEN query LIKE 'INSERT INTO cost_model%' THEN 'INSERT_cost_model' WHEN query LIKE 'INSERT INTO epoch_sync_time%' THEN 'INSERT_epoch_sync_time' WHEN query LIKE 'INSERT INTO off_chain_pool%' THEN 'INSERT_off_chain_pool' WHEN query LIKE 'SELECT id FROM tx WHERE hash%' THEN 'SELECT_tx_by_hash' WHEN query LIKE 'SELECT id FROM script WHERE hash%' THEN 'SELECT_script_by_hash' WHEN query LIKE 'SELECT id FROM redeemer_data WHERE hash%' THEN 'SELECT_redeemer_data_by_hash' WHEN query LIKE 'SELECT%tx_out%' THEN 'SELECT_tx_out' WHEN query LIKE 'SELECT%tx_in%' THEN 'SELECT_tx_in' WHEN query LIKE 'SELECT%stake_address%' THEN 'SELECT_stake_address' WHEN query LIKE 'SELECT%pool_hash%' THEN 'SELECT_pool_hash' WHEN query LIKE 'SELECT%datum%' THEN 'SELECT_datum' WHEN query LIKE 'SELECT%multi_asset%' THEN 'SELECT_multi_asset' WHEN query LIKE 'SELECT%block%' THEN 'SELECT_block' ELSE 'OTHER' END as query_type, SUM(calls)::float as total_calls, SUM(total_exec_time)::float as total_time_ms, AVG(mean_exec_time)::float as avg_mean_time_ms FROM pg_stat_statements WHERE (query LIKE 'INSERT INTO%' OR query LIKE 'SELECT%') AND query NOT LIKE '%pg_stat_statements%' AND query NOT LIKE '%pg_catalog%' AND query NOT LIKE '%pg_stat_database%' AND query NOT LIKE '%pg_stat_bgwriter%' AND query NOT LIKE 'SELECT COUNT(%)%tx_count%' AND query NOT LIKE 'SELECT pg_database_size%' AND query NOT LIKE 'SELECT CASE WHEN%blks_hit%' AND query NOT LIKE 'SELECT setting%version%' AND query NOT LIKE 'SELECT COUNT(%)FROM epoch_stake%' AND query NOT LIKE 'SELECT COUNT(%)FROM reward%' AND query NOT LIKE 'SELECT migrate()%' AND query NOT LIKE 'SELECT id%voting_anchor%' GROUP BY query_type"""
    min_version = 901
    withdbname = false
    tagvalue = "query_type"
    measurement = "pg_stat_statements_queries"

# Monitor PostgreSQL process
[[inputs.procstat]]
  ## Pattern to match process name (matches postgres server processes)
  pattern = "postgres.*-D"
  
  ## Name for this process in metrics
  process_name = "postgres"
  
  ## User to filter by (optional)
  # user = "postgres"
  
  [inputs.procstat.tags]
    service = "postgresql"
    component = "database"
    source = "telegraf"
